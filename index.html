<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia de Tenis - Numeros</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --court: #2d5a1b;
  --court-light: #3d7a26;
  --clay: #c2784a;
  --clay-light: #e8a070;
  --ball: #c8d42b;
  --bg: #f7f6f0;
  --surface: #ffffff;
  --surface2: #f0ede4;
  --border: rgba(0,0,0,0.07);
  --text: #1c1c18;
  --muted: #7a7870;
  --hint: #b5b2a8;
  --green: #2d6a4f;
  --green-l: #d8f3dc;
  --blue: #2563eb;
  --blue-l: #dbeafe;
  --amber: #b45309;
  --amber-l: #fef3c7;
  --red: #dc2626;
  --red-l: #fee2e2;
  --purple: #7c3aed;
  --purple-l: #ede9fe;
  --radius: 16px;
  --radius-sm: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LANDING / SELECT ── */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden;}
.landing-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1a3a0e 0%,#2d5a1b 40%,#1c3d2a 100%);z-index:0;}
.landing-lines{position:absolute;inset:0;opacity:0.08;background-image:repeating-linear-gradient(0deg,transparent,transparent 58px,rgba(255,255,255,0.5) 58px,rgba(255,255,255,0.5) 60px),repeating-linear-gradient(90deg,transparent,transparent 58px,rgba(255,255,255,0.5) 58px,rgba(255,255,255,0.5) 60px);z-index:1;}
.landing-content{position:relative;z-index:2;text-align:center;max-width:520px;width:100%;}
.landing-ball{width:52px;height:52px;border-radius:50%;background:var(--ball);margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(200,212,43,0.4);}
.landing-ball svg{width:30px;height:30px;}
.landing-title{font-family:'Syne',sans-serif;font-size:clamp(28px,6vw,46px);font-weight:700;color:white;line-height:1.1;margin-bottom:8px;}
.landing-sub{font-size:15px;color:rgba(255,255,255,0.65);margin-bottom:2.5rem;}
.select-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:1.5rem;width:100%;}
.select-label{font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;text-align:left;}
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.player-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:10px;text-align:left;}
.player-btn:hover{background:rgba(255,255,255,0.15);border-color:rgba(200,212,43,0.4);transform:translateY(-1px);}
.player-btn:active{transform:translateY(0);}
.pb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:white;}
.pb-name{font-size:13px;font-weight:500;color:white;line-height:1.2;}
.pb-age{font-size:11px;color:rgba(255,255,255,0.45);}
.loading-state{color:rgba(255,255,255,0.6);font-size:13px;padding:1rem;text-align:center;}

/* ── APP SHELL ── */
.app{display:none;min-height:100vh;flex-direction:column;}
.app.visible{display:flex;}

/* ── HEADER ── */
.app-header{background:var(--court);padding:0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;}
.header-back{background:rgba(255,255,255,0.1);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;color:white;font-size:12px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;}
.header-back:hover{background:rgba(255,255,255,0.18);}
.header-player{display:flex;align-items:center;gap:10px;}
.header-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:white;flex-shrink:0;}
.header-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;color:white;}
.header-meta{font-size:11px;color:rgba(255,255,255,0.6);}
.header-ball{width:28px;height:28px;border-radius:50%;background:var(--ball);display:flex;align-items:center;justify-content:center;}

/* ── TABS ── */
.app-tabs{display:flex;padding:10px 20px 0;gap:0;overflow-x:auto;scrollbar-width:none;}
.app-tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:rgba(255,255,255,0.5);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all 0.15s;margin-bottom:0;}
.tab-btn.active{color:var(--ball);border-bottom-color:var(--ball);font-weight:500;}
.tab-btn:hover:not(.active){color:rgba(255,255,255,0.8);}

/* ── CONTENT ── */
.app-content{flex:1;padding:20px 16px 40px;}
.tab-view{display:none;}
.tab-view.active{display:block;}

/* ── METRIC CARDS ── */
.metrics-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:500;}
.metric-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--text);margin:2px 0 1px;line-height:1;}
.metric-sub{font-size:11px;color:var(--hint);}
.metric-up{color:var(--green);}
.metric-full{grid-column:1/-1;}

/* ── SKILL BARS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:14px;}
.skill-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.skill-row:last-child{margin-bottom:0;}
.skill-name{font-size:13px;color:var(--text);width:100px;flex-shrink:0;}
.skill-track{flex:1;height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.skill-fill{height:100%;border-radius:99px;transition:width 0.7s cubic-bezier(0.34,1.2,0.64,1);}
.skill-score{font-size:12px;font-family:'DM Mono',monospace;font-weight:500;color:var(--muted);width:24px;text-align:right;flex-shrink:0;}

/* ── SESSION LIST ── */
.session-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.session-item:last-child{border-bottom:none;padding-bottom:0;}
.session-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.session-date{font-size:11px;color:var(--hint);font-family:'DM Mono',monospace;}
.session-type{font-size:12px;font-weight:500;color:var(--text);margin:2px 0;}
.session-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.session-pill{font-size:10px;background:var(--surface2);color:var(--muted);padding:2px 7px;border-radius:5px;font-family:'DM Mono',monospace;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:500;}
.badge-green{background:var(--green-l);color:var(--green);}
.badge-blue{background:var(--blue-l);color:var(--blue);}
.badge-amber{background:var(--amber-l);color:var(--amber);}
.badge-red{background:var(--red-l);color:var(--red);}
.badge-purple{background:var(--purple-l);color:var(--purple);}

/* ── OBJETIVO ── */
.obj-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.obj-row:last-child{margin-bottom:0;}
.obj-label{font-size:12px;color:var(--text);width:130px;flex-shrink:0;}
.obj-track{flex:1;height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.obj-fill{height:100%;border-radius:99px;}
.obj-vals{font-size:11px;font-family:'DM Mono',monospace;color:var(--hint);width:52px;text-align:right;flex-shrink:0;}

/* ── CHART ── */
.chart-wrap{position:relative;width:100%;height:220px;}

/* ── FEEDBACK ── */
.feedback-block{background:var(--surface2);border-left:3px solid var(--court-light);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 14px;font-size:13px;color:var(--text);line-height:1.6;}
.feedback-date{font-size:11px;color:var(--hint);font-family:'DM Mono',monospace;margin-bottom:4px;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:2rem;color:var(--hint);font-size:13px;}

/* ── LOADER ── */
.spinner{width:32px;height:32px;border:3px solid var(--surface2);border-top-color:var(--court);border-radius:50%;animation:spin 0.8s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-view{text-align:center;padding:3rem 1rem;}
.loading-view p{font-size:13px;color:var(--muted);margin-top:10px;}

/* ── RESPONSIVE ── */
@media(min-width:480px){
  .metrics-row{grid-template-columns:repeat(4,1fr);}
  .metric-full{grid-column:auto;}
  .app-content{padding:24px 24px 40px;}
}
@media(min-width:700px){
  .player-grid{grid-template-columns:repeat(3,1fr);}
  .landing-content{max-width:620px;}
}
</style>
</head>
<body>

<!-- ═══ LANDING ═══ -->
<div class="landing" id="landing">
  <div class="landing-bg"></div>
  <div class="landing-lines"></div>
  <div class="landing-content">
    <div class="landing-ball">
      <svg viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="15" r="13" stroke="#1a3a0e" stroke-width="2"/>
        <path d="M2 15 Q8 8 15 15 Q22 22 28 15" stroke="#1a3a0e" stroke-width="2" fill="none"/>
      </svg>
    </div>
    <div class="landing-title">Academia de Tenis<br>Arroyito</div>
    <div class="landing-sub">Numeros - Temporada 2026</div>
    <div class="select-card">
      <div class="select-label">Listado de Jugadores</div>
      <div class="player-grid" id="player-grid">
        <div class="loading-state">Cargando jugadores...</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div class="app" id="app">
  <header class="app-header">
    <div class="header-top">
      <button class="header-back" onclick="goBack()">← Volver</button>
      <div class="header-player">
        <div class="header-avatar" id="h-avatar"></div>
        <div>
          <div class="header-name" id="h-name"></div>
          <div class="header-meta" id="h-meta"></div>
        </div>
      </div>
      <div class="header-ball">
        <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
          <circle cx="10" cy="10" r="8" stroke="#1a3a0e" stroke-width="1.5"/>
          <path d="M2 10 Q6 5 10 10 Q14 15 18 10" stroke="#1a3a0e" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
    </div>
    <nav class="app-tabs">
      <button class="tab-btn active" onclick="switchTab('resumen',this)">Resumen</button>
      <button class="tab-btn" onclick="switchTab('progreso',this)">Progreso</button>
      <button class="tab-btn" onclick="switchTab('historial',this)">Historial</button>
    </nav>
  </header>

  <main class="app-content">

    <!-- RESUMEN -->
    <div class="tab-view active" id="tab-resumen">
      <div class="loading-view" id="loading-resumen">
        <div class="spinner"></div>
        <p>Cargando datos...</p>
      </div>
      <div id="content-resumen" style="display:none;"></div>
    </div>

    <!-- PROGRESO -->
    <div class="tab-view" id="tab-progreso">
      <div class="loading-view" id="loading-progreso">
        <div class="spinner"></div>
        <p>Cargando evolución...</p>
      </div>
      <div id="content-progreso" style="display:none;"></div>
    </div>

    <!-- HISTORIAL -->
    <div class="tab-view" id="tab-historial">
      <div class="loading-view" id="loading-historial">
        <div class="spinner"></div>
        <p>Cargando historial...</p>
      </div>
      <div id="content-historial" style="display:none;"></div>
    </div>

  </main>
</div>

<script>
// ══════════════════════════════════════
// CONFIGURACIÓN — EDITÁ SOLO ESTO
// ══════════════════════════════════════
const SHEET_ID   = '1Frlg1Kcl1SZ9qsC7G0NvcxziGua2wZrCE8LIRpg7CJk';
const SHEET_NAME = 'Registro - Numeros';
const INFO_SHEET = 'informacion';

// Columnas de tu Google Sheets — orden exacto de tu hoja
// A=Fecha Sesion, B=Alumno, C=Tipo de sesión
// D=Drive, E=Revés, F=Saque, G=Volea, H=Resto
// I=Resistencia, J=Velocidad, K=Agilidad, L=Fuerza
// M=Concentración, N=Actitud, O=Gestión errores
// P=Observación del Profe, Q=Descripción de la Sesión
const COL = {
  fecha:0, alumno:1, tipo:2,
  drive:3, reves:4, saque:5, volea:6, resto:7,
  resistencia:8, velocidad:9, agilidad:10, fuerza:11,
  concentracion:12, actitud:13, errores:14,
  obs_profe:15, descripcion:16
};

// Columnas hoja "informacion"
// A=Alumno, B=Brazo hábil, C=Altura, D=Edad, E=Categoría, F=Objetivo
const INFO = { alumno:0, brazo:1, altura:2, edad:3, categoria:4, objetivo:5 };

const AVATAR_COLORS = [
  '#2d5a1b','#c2784a','#2563eb','#7c3aed',
  '#b45309','#dc2626','#0891b2','#059669'
];

// ══════════════════════════════════════
// ESTADO GLOBAL
// ══════════════════════════════════════
let allRows = [];
let infoRows = [];
let currentPlayer = null;
let playerSessions = [];
let filteredSessions = [];
let charts = {};
let dateFrom = null;
let dateTo = null;

// ══════════════════════════════════════
// FETCH GOOGLE SHEETS (CSV público)
// ══════════════════════════════════════
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`No se pudo conectar con la hoja: ${sheetName}`);
  return parseCSV(await res.text());
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  }).filter(r => r[0] && r[0].length > 0);
}

// ══════════════════════════════════════
// INIT — CARGA JUGADORES EN LANDING
// ══════════════════════════════════════
async function init() {
  try {
    [allRows, infoRows] = await Promise.all([
      fetchSheet(SHEET_NAME),
      fetchSheet(INFO_SHEET).catch(() => []) // si falla info, continúa igual
    ]);
    const players = [...new Set(allRows.map(r => r[COL.alumno]))].filter(Boolean).sort();
    renderPlayerGrid(players);
  } catch(e) {
    document.getElementById('player-grid').innerHTML =
      `<div class="loading-state" style="grid-column:1/-1;color:#ffaaaa;">Error al conectar con la planilla.<br><small>${e.message}</small></div>`;
  }
}

function getPlayerInfo(name) {
  return infoRows.find(r => r[INFO.alumno]?.trim() === name.trim()) || null;
}

function renderPlayerGrid(players) {
  const grid = document.getElementById('player-grid');
  if (!players.length) {
    grid.innerHTML = '<div class="loading-state">No hay jugadores cargados aún.</div>';
    return;
  }
  grid.innerHTML = players.map((name, i) => {
    const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const color = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const playerRows = allRows.filter(r => r[COL.alumno] === name);
    const lastTipo = playerRows[playerRows.length-1]?.[COL.tipo] || '';
    return `<button class="player-btn" onclick="selectPlayer('${name.replace(/'/g,"\\'")}')">
      <div class="pb-avatar" style="background:${color};">${initials}</div>
      <div>
        <div class="pb-name">${name}</div>
        <div class="pb-age">${playerRows.length} sesión${playerRows.length!==1?'es':''}</div>
      </div>
    </button>`;
  }).join('');
}

// ══════════════════════════════════════
// SELECCIONAR JUGADOR
// ══════════════════════════════════════
function selectPlayer(name) {
  currentPlayer = name;
  dateFrom = null;
  dateTo = null;
  selectedMonth = null;
  playerSessions = allRows
    .filter(r => r[COL.alumno] === name)
    .sort((a,b) => new Date(parseDate(a[COL.fecha])) - new Date(parseDate(b[COL.fecha])));
  filteredSessions = [...playerSessions];

  const idx = [...new Set(allRows.map(r=>r[COL.alumno]))].sort().indexOf(name);
  const color = AVATAR_COLORS[idx % AVATAR_COLORS.length];
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const info = getPlayerInfo(name);

  document.getElementById('h-avatar').style.background = color;
  document.getElementById('h-avatar').textContent = initials;
  document.getElementById('h-name').textContent = name;
  document.getElementById('h-meta').textContent = info
    ? [info[INFO.edad]?info[INFO.edad]+' años':'', info[INFO.categoria]||'', playerSessions.length+' sesiones'].filter(Boolean).join(' · ')
    : `${playerSessions.length} sesión${playerSessions.length!==1?'es':''} registradas`;

  document.getElementById('landing').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.tab-btn').classList.add('active');
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('tab-resumen').classList.add('active');

  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts = {};

  buildResumen();
  buildProgreso();
  buildHistorial();
}

function goBack() {
  document.getElementById('landing').style.display = '';
  document.getElementById('app').classList.remove('visible');
  currentPlayer = null;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function parseDate(str) {
  if (!str) return null;
  // handle dd/mm/yyyy or yyyy-mm-dd
  const parts = str.split('/');
  if (parts.length === 3) return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
  return str;
}

function fmtDate(str) {
  const d = new Date(parseDate(str)+'T12:00:00');
  if (isNaN(d)) return str;
  return d.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'});
}

function num(v) { return parseFloat((v+'').replace(',','.')) || 0; }

function skillColor(v) {
  if (v >= 8) return '#2d6a4f';
  if (v >= 6) return '#2563eb';
  if (v >= 4) return '#b45309';
  return '#dc2626';
}

function typeBadge(t) {
  const map = {
    'Entrenamiento técnico':'badge-blue','Técnica':'badge-blue',
    'Entrenamiento físico':'badge-green','Física':'badge-green','Físico':'badge-green',
    'Partido':'badge-amber','Partido de práctica':'badge-amber',
    'Mental':'badge-purple','Trabajo mental':'badge-purple',
    'Torneo':'badge-red'
  };
  const cls = map[t] || 'badge-blue';
  return `<span class="badge ${cls}">${t || 'Sesión'}</span>`;
}

function skillRow(name, val) {
  const v = num(val);
  return `<div class="skill-row">
    <span class="skill-name">${name}</span>
    <div class="skill-track"><div class="skill-fill" style="width:${v*10}%;background:${skillColor(v)};"></div></div>
    <span class="skill-score">${v > 0 ? v.toFixed(1) : '—'}</span>
  </div>`;
}

// ══════════════════════════════════════
// HELPERS DE CÁLCULO GLOBAL
// ══════════════════════════════════════
function calcTec(s){ const v=[num(s[COL.drive]),num(s[COL.reves]),num(s[COL.saque]),num(s[COL.volea]),num(s[COL.resto])].filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; }
function calcFis(s){ const v=[num(s[COL.resistencia]),num(s[COL.velocidad]),num(s[COL.agilidad]),num(s[COL.fuerza])].filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; }
function calcMen(s){ const v=[num(s[COL.concentracion]),num(s[COL.actitud]),num(s[COL.errores])].filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; }

// Promedio de un array de valores > 0
function avg(arr){ const v=arr.filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; }

// Mes key: "2026-05"
function monthKey(dateStr){ const d=new Date(parseDate(dateStr)+'T12:00:00'); return isNaN(d)?null:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(key){ if(!key)return''; const [y,m]=key.split('-'); const names=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return `${names[parseInt(m)-1]} ${y}`; }

// Promedio mensual de una función fn sobre un array de sesiones
function monthlyAvg(sessions, fn){
  const map={};
  sessions.forEach(s=>{ const k=monthKey(s[COL.fecha]); if(!k)return; if(!map[k])map[k]=[]; map[k].push(fn(s)); });
  const result={};
  Object.entries(map).forEach(([k,vals])=>{ result[k]=avg(vals); });
  return result;
}

// Benchmark de categoría: promedio de la última sesión de cada alumno de misma categoría (excl. actual)
function categoryBenchmark(playerName){
  const myInfo = getPlayerInfo(playerName);
  const myCategoria = myInfo?.[INFO.categoria]?.trim().toLowerCase();
  if(!myCategoria) return null;

  const peers = infoRows
    .filter(r => r[INFO.alumno]?.trim() !== playerName.trim()
              && r[INFO.categoria]?.trim().toLowerCase() === myCategoria);

  if(!peers.length) return null;

  const benchTec=[], benchFis=[], benchMen=[];
  const benchDrive=[], benchReves=[], benchSaque=[], benchVolea=[], benchResto=[];
  const benchRes=[], benchVel=[], benchAgi=[], benchFue=[];
  const benchCon=[], benchAct=[], benchErr=[];

  peers.forEach(p=>{
    const pName = p[INFO.alumno]?.trim();
    const pSess = allRows.filter(r=>r[COL.alumno]===pName).sort((a,b)=>new Date(parseDate(a[COL.fecha]))-new Date(parseDate(b[COL.fecha])));
    if(!pSess.length) return;
    const last = pSess[pSess.length-1];
    benchTec.push(calcTec(last)); benchFis.push(calcFis(last)); benchMen.push(calcMen(last));
    benchDrive.push(num(last[COL.drive])); benchReves.push(num(last[COL.reves]));
    benchSaque.push(num(last[COL.saque])); benchVolea.push(num(last[COL.volea])); benchResto.push(num(last[COL.resto]));
    benchRes.push(num(last[COL.resistencia])); benchVel.push(num(last[COL.velocidad]));
    benchAgi.push(num(last[COL.agilidad])); benchFue.push(num(last[COL.fuerza]));
    benchCon.push(num(last[COL.concentracion])); benchAct.push(num(last[COL.actitud])); benchErr.push(num(last[COL.errores]));
  });

  if(!benchTec.length) return null;
  return {
    categoria: myInfo[INFO.categoria],
    tec:avg(benchTec), fis:avg(benchFis), men:avg(benchMen),
    drive:avg(benchDrive), reves:avg(benchReves), saque:avg(benchSaque), volea:avg(benchVolea), resto:avg(benchResto),
    resistencia:avg(benchRes), velocidad:avg(benchVel), agilidad:avg(benchAgi), fuerza:avg(benchFue),
    concentracion:avg(benchCon), actitud:avg(benchAct), errores:avg(benchErr),
    n: peers.length
  };
}

// ══════════════════════════════════════
// FILTRO POR MES
// ══════════════════════════════════════
let selectedMonth = null; // null = todos

function getAvailableMonths(){
  const keys = [...new Set(playerSessions.map(s=>monthKey(s[COL.fecha])).filter(Boolean))].sort();
  return keys;
}

function applyMonthFilter(month){
  selectedMonth = month;
  filteredSessions = month
    ? playerSessions.filter(s => monthKey(s[COL.fecha]) === month)
    : [...playerSessions];
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts = {};
  buildResumen();
  buildProgreso();
  buildHistorial();
}

// ══════════════════════════════════════
// RESUMEN
// ══════════════════════════════════════
function buildResumen() {
  const el     = document.getElementById('content-resumen');
  const loadEl = document.getElementById('loading-resumen');
  const info   = getPlayerInfo(currentPlayer);
  const sess   = filteredSessions;

  // ── Colores de categoría ─────────────
  const catColor = (c='') => {
    const lc = c.toLowerCase();
    if (lc.includes('verde'))  return {bg:'#d8f3dc',dot:'#2d6a4f',tx:'#1a3c2a'};
    if (lc.includes('azul'))   return {bg:'#dbeafe',dot:'#2563eb',tx:'#1e3a8a'};
    if (lc.includes('rojo'))   return {bg:'#fee2e2',dot:'#dc2626',tx:'#7f1d1d'};
    if (lc.includes('naranja'))return {bg:'#fef3c7',dot:'#b45309',tx:'#78350f'};
    return {bg:'#f0ede4',dot:'#7a7870',tx:'#3a3830'};
  };
  const cc = catColor(info?.[INFO.categoria]);

  // ── Ficha personal ───────────────────
  const infoHTML = info ? `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:14px 24px;align-items:flex-start;">
      ${info[INFO.brazo]    ?`<div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Brazo hábil</div><div style="font-size:14px;font-weight:500;">${info[INFO.brazo]}</div></div>`:''}
      ${info[INFO.altura]   ?`<div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Altura</div><div style="font-size:14px;font-weight:500;">${info[INFO.altura]}</div></div>`:''}
      ${info[INFO.edad]     ?`<div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Edad</div><div style="font-size:14px;font-weight:500;">${info[INFO.edad]} años</div></div>`:''}
      ${info[INFO.categoria]?`<div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Categoría</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${cc.dot};flex-shrink:0;"></div>
          <span style="font-size:14px;font-weight:500;color:${cc.tx};">${info[INFO.categoria]}</span>
        </div></div>`:''}
      ${info[INFO.objetivo] ?`<div style="flex-basis:100%;"><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Objetivo</div><div style="font-size:13px;color:var(--text);">${info[INFO.objetivo]}</div></div>`:''}
    </div>` : '';

  // ── Selector de mes ──────────────────
  const months = getAvailableMonths();
  const monthBtns = months.map(m=>`
    <button onclick="applyMonthFilter('${m}')"
      style="padding:5px 12px;font-size:12px;border-radius:99px;border:1px solid ${selectedMonth===m?'transparent':' var(--border)'};
             background:${selectedMonth===m?'var(--court)':'var(--surface)'};
             color:${selectedMonth===m?'white':'var(--muted)'};
             cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;">
      ${monthLabel(m)}
    </button>`).join('');

  const filterHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;">
      <div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Filtrar por mes</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <button onclick="applyMonthFilter(null)"
          style="padding:5px 12px;font-size:12px;border-radius:99px;border:1px solid ${!selectedMonth?'transparent':'var(--border)'};
                 background:${!selectedMonth?'var(--court)':'var(--surface)'};
                 color:${!selectedMonth?'white':'var(--muted)'};
                 cursor:pointer;font-family:inherit;white-space:nowrap;">
          Todos
        </button>
        ${monthBtns}
      </div>
      ${selectedMonth?`<div style="font-size:11px;color:var(--amber);margin-top:8px;">${sess.length} sesión${sess.length!==1?'es':''} en ${monthLabel(selectedMonth)}</div>`:''}
    </div>`;

  if (!sess.length) {
    loadEl.style.display = 'none';
    el.style.display = 'block';
    el.innerHTML = infoHTML + filterHTML + '<div class="empty">No hay sesiones en este mes.</div>';
    return;
  }

  // ── Cálculos del mes actual y anterior ─
  const currentMonthKey = selectedMonth || monthKey(sess[sess.length-1][COL.fecha]);
  const allMonths = getAvailableMonths();
  const prevMonthKey = allMonths[allMonths.indexOf(currentMonthKey)-1] || null;

  const currentMonthSess = playerSessions.filter(s=>monthKey(s[COL.fecha])===currentMonthKey);
  const prevMonthSess    = prevMonthKey ? playerSessions.filter(s=>monthKey(s[COL.fecha])===prevMonthKey) : [];

  const tecCurr = avg(currentMonthSess.map(calcTec));
  const fisCurr = avg(currentMonthSess.map(calcFis));
  const menCurr = avg(currentMonthSess.map(calcMen));
  const totCurr = avg([tecCurr,fisCurr,menCurr].filter(v=>v>0));

  const tecPrev = prevMonthSess.length ? avg(prevMonthSess.map(calcTec)) : null;
  const fisPrev = prevMonthSess.length ? avg(prevMonthSess.map(calcFis)) : null;
  const menPrev = prevMonthSess.length ? avg(prevMonthSess.map(calcMen)) : null;

  // ── Benchmark de categoría ───────────
  const bench = categoryBenchmark(currentPlayer);

  const monthDelta = (curr, prev) => {
    if(prev===null) return `<span style="color:var(--hint);font-size:10px;">sin mes anterior</span>`;
    const d = (curr-prev).toFixed(1);
    const label = `vs ${monthLabel(prevMonthKey)}`;
    if(d>0) return `<span class="metric-up" style="font-size:10px;">↑ +${d} ${label}</span>`;
    if(d<0) return `<span style="color:var(--red);font-size:10px;">↓ ${d} ${label}</span>`;
    return `<span style="color:var(--hint);font-size:10px;">= igual ${label}</span>`;
  };

  // ── Barra con benchmark ──────────────
  const sRowBench = (name, val, benchVal) => {
    const v = num(val);
    const b = benchVal ? parseFloat(benchVal.toFixed(1)) : null;
    const bPct = b ? Math.min(100,b*10) : 0;
    const diff = b ? (v-b).toFixed(1) : null;
    const diffEl = diff===null ? ''
      : diff>0 ? `<span style="font-size:10px;color:var(--green);margin-left:4px;">+${diff}</span>`
      : diff<0 ? `<span style="font-size:10px;color:var(--red);margin-left:4px;">${diff}</span>`
      : `<span style="font-size:10px;color:var(--hint);margin-left:4px;">=</span>`;
    return `<div class="skill-row" style="margin-bottom:12px;flex-direction:column;align-items:stretch;gap:4px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--text);">${name}</span>
        <div style="display:flex;align-items:center;">
          <span style="font-size:13px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text);">${v>0?v.toFixed(1):'—'}</span>
          ${diffEl}
        </div>
      </div>
      <div style="position:relative;height:8px;background:var(--surface2);border-radius:99px;overflow:visible;">
        <div style="height:100%;width:${v>0?v*10:0}%;background:${skillColor(v)};border-radius:99px;transition:width .7s cubic-bezier(.34,1.2,.64,1);"></div>
        ${b?`<div style="position:absolute;top:-3px;left:${bPct}%;width:2px;height:14px;background:var(--hint);border-radius:2px;transform:translateX(-50%);" title="Promedio cat. ${bench.categoria}: ${b}"></div>`:''}
      </div>
      ${b?`<div style="font-size:10px;color:var(--hint);">— Categoría ${bench.categoria}: ${b}</div>`:''}
    </div>`;
  };

  // ── Última sesión para las barras ────
  const last = sess[sess.length-1];

  el.innerHTML = infoHTML + filterHTML + `

    <div class="metrics-row" style="margin-bottom:14px;">
      <div class="metric-card">
        <div class="metric-label">Técnica</div>
        <div class="metric-value">${tecCurr.toFixed(1)}</div>
        <div class="metric-sub">${monthDelta(tecCurr,tecPrev)}</div>
        ${bench?`<div style="font-size:10px;color:var(--hint);margin-top:4px;">Cat.: ${bench.tec.toFixed(1)}</div>`:''}
      </div>
      <div class="metric-card">
        <div class="metric-label">Físico</div>
        <div class="metric-value">${fisCurr.toFixed(1)}</div>
        <div class="metric-sub">${monthDelta(fisCurr,fisPrev)}</div>
        ${bench?`<div style="font-size:10px;color:var(--hint);margin-top:4px;">Cat.: ${bench.fis.toFixed(1)}</div>`:''}
      </div>
      <div class="metric-card">
        <div class="metric-label">Mental</div>
        <div class="metric-value">${menCurr.toFixed(1)}</div>
        <div class="metric-sub">${monthDelta(menCurr,menPrev)}</div>
        ${bench?`<div style="font-size:10px;color:var(--hint);margin-top:4px;">Cat.: ${bench.men.toFixed(1)}</div>`:''}
      </div>
      <div class="metric-card">
        <div class="metric-label">Promedio total</div>
        <div class="metric-value">${totCurr.toFixed(1)}</div>
        <div class="metric-sub" style="font-size:10px;">${monthLabel(currentMonthKey)} · ${currentMonthSess.length} ses.</div>
      </div>
    </div>

    ${bench?`<div style="font-size:11px;color:var(--hint);background:var(--surface2);border-radius:8px;padding:7px 10px;margin-bottom:14px;">
      La línea <span style="color:var(--muted);font-weight:500;">|</span> en cada barra indica el promedio de la categoría ${bench.categoria} (${bench.n} jugador${bench.n!==1?'es':''}).
    </div>`:''}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
      <div class="card" style="margin-bottom:0;">
        <div class="card-title">Técnica</div>
        ${sRowBench('Drive',   last[COL.drive],   bench?.drive)}
        ${sRowBench('Revés',   last[COL.reves],   bench?.reves)}
        ${sRowBench('Saque',   last[COL.saque],   bench?.saque)}
        ${sRowBench('Volea',   last[COL.volea],   bench?.volea)}
        ${sRowBench('Resto',   last[COL.resto],   bench?.resto)}
      </div>
      <div>
        <div class="card" style="margin-bottom:12px;">
          <div class="card-title">Físico</div>
          ${sRowBench('Resistencia', last[COL.resistencia], bench?.resistencia)}
          ${sRowBench('Velocidad',   last[COL.velocidad],   bench?.velocidad)}
          ${sRowBench('Agilidad',    last[COL.agilidad],    bench?.agilidad)}
          ${sRowBench('Fuerza',      last[COL.fuerza],      bench?.fuerza)}
        </div>
        <div class="card" style="margin-bottom:0;">
          <div class="card-title">Mental</div>
          ${sRowBench('Concentración', last[COL.concentracion], bench?.concentracion)}
          ${sRowBench('Actitud',       last[COL.actitud],       bench?.actitud)}
          ${sRowBench('Gest. errores', last[COL.errores],       bench?.errores)}
        </div>
      </div>
    </div>

    <div style="font-size:10px;color:var(--hint);text-align:right;margin-bottom:14px;">Última sesión: ${fmtDate(last[COL.fecha])}</div>
    ${last[COL.descripcion]?`<div class="card"><div class="card-title">Descripción de la sesión</div><div class="feedback-block">${last[COL.descripcion]}</div></div>`:''}
    ${last[COL.obs_profe]  ?`<div class="card"><div class="card-title">Observación del coach</div><div class="feedback-block" style="border-color:var(--ball);">${last[COL.obs_profe]}</div></div>`:''}
  `;

  loadEl.style.display = 'none';
  el.style.display = 'block';
}

function buildProgreso() {
  const el = document.getElementById('content-progreso');
  const loadEl = document.getElementById('loading-progreso');

  const sess = filteredSessions;

  if (sess.length < 2) {
    loadEl.style.display = 'none';
    el.style.display = 'block';
    el.innerHTML = '<div class="empty">Necesitás al menos 2 sesiones para ver la evolución.</div>';
    return;
  }

  const labels = sess.map(s => fmtDate(s[COL.fecha]));

  const calcTec = (s) => { const v=[num(s[COL.drive]),num(s[COL.reves]),num(s[COL.saque]),num(s[COL.volea]),num(s[COL.resto])].filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };
  const calcFis = (s) => { const v=[num(s[COL.resistencia]),num(s[COL.velocidad]),num(s[COL.agilidad]),num(s[COL.fuerza])].filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };
  const calcMen = (s) => { const v=[num(s[COL.concentracion]),num(s[COL.actitud]),num(s[COL.errores])].filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };
  const calcTot = (s) => { const v=[calcTec(s),calcFis(s),calcMen(s)].filter(x=>x); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };

  el.innerHTML = `
    <div class="card">
      <div class="card-title">Evolución técnica</div>
      <div class="chart-wrap"><canvas id="chart-tec" role="img" aria-label="Evolución técnica de ${currentPlayer}">Gráfico de evolución técnica.</canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Evolución física</div>
      <div class="chart-wrap"><canvas id="chart-fis" role="img" aria-label="Evolución física">Gráfico físico.</canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Evolución mental</div>
      <div class="chart-wrap"><canvas id="chart-men" role="img" aria-label="Evolución mental">Gráfico mental.</canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Promedio total por sesión</div>
      <div class="chart-wrap" style="height:160px;"><canvas id="chart-tot" role="img" aria-label="Promedio total">Promedio total.</canvas></div>
    </div>
  `;

  loadEl.style.display = 'none';
  el.style.display = 'block';

  const chartOpts = () => ({
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:true,position:'bottom',labels:{color:'#7a7870',font:{size:10},boxWidth:8,padding:10}}},
    scales:{
      y:{min:0,max:10,ticks:{stepSize:2,color:'#b5b2a8',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
      x:{ticks:{color:'#b5b2a8',font:{size:10},maxRotation:40,autoSkip:true,maxTicksLimit:6},grid:{color:'rgba(0,0,0,0.04)'}}
    }
  });

  charts['tec'] = new Chart(document.getElementById('chart-tec'),{
    type:'line', data:{labels, datasets:[
      {label:'Drive',data:sess.map(s=>num(s[COL.drive])||null),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,0.06)',tension:0.35,pointRadius:4,spanGaps:true},
      {label:'Revés',data:sess.map(s=>num(s[COL.reves])||null),borderColor:'#dc2626',backgroundColor:'rgba(220,38,38,0.06)',tension:0.35,pointRadius:4,spanGaps:true},
      {label:'Saque',data:sess.map(s=>num(s[COL.saque])||null),borderColor:'#2d6a4f',backgroundColor:'rgba(45,106,79,0.06)',tension:0.35,pointRadius:4,spanGaps:true},
      {label:'Volea',data:sess.map(s=>num(s[COL.volea])||null),borderColor:'#b45309',backgroundColor:'rgba(180,83,9,0.06)',tension:0.35,pointRadius:4,spanGaps:true},
    ]}, options:chartOpts()
  });

  charts['fis'] = new Chart(document.getElementById('chart-fis'),{
    type:'line', data:{labels, datasets:[
      {label:'Resistencia',data:sess.map(s=>num(s[COL.resistencia])||null),borderColor:'#2d6a4f',tension:0.35,pointRadius:4,spanGaps:true},
      {label:'Velocidad',data:sess.map(s=>num(s[COL.velocidad])||null),borderColor:'#2563eb',tension:0.35,pointRadius:4,spanGaps:true},
      {label:'Agilidad',data:sess.map(s=>num(s[COL.agilidad])||null),borderColor:'#b45309',tension:0.35,pointRadius:4,spanGaps:true},
      {label:'Fuerza',data:sess.map(s=>num(s[COL.fuerza])||null),borderColor:'#7c3aed',tension:0.35,pointRadius:4,spanGaps:true},
    ]}, options:chartOpts()
  });

  charts['men'] = new Chart(document.getElementById('chart-men'),{
    type:'line', data:{labels, datasets:[
      {label:'Concentración',data:sess.map(s=>num(s[COL.concentracion])||null),borderColor:'#7c3aed',tension:0.35,pointRadius:4,spanGaps:true},
      {label:'Actitud',data:sess.map(s=>num(s[COL.actitud])||null),borderColor:'#dc2626',tension:0.35,pointRadius:4,spanGaps:true},
      {label:'Gestión errores',data:sess.map(s=>num(s[COL.errores])||null),borderColor:'#2563eb',tension:0.35,pointRadius:4,spanGaps:true},
    ]}, options:chartOpts()
  });

  charts['tot'] = new Chart(document.getElementById('chart-tot'),{
    type:'bar',
    data:{labels, datasets:[{
      label:'Promedio total',
      data:sess.map(s=>{ const t=calcTot(s); return t?parseFloat(t.toFixed(1)):null; }),
      backgroundColor:sess.map(s=>{ const t=calcTot(s)||0; return t>=8?'rgba(45,106,79,0.75)':t>=6?'rgba(37,99,235,0.75)':'rgba(180,83,9,0.75)'; }),
      borderRadius:6,
    }]},
    options:{...chartOpts(),plugins:{legend:{display:false}}}
  });
}

// ══════════════════════════════════════
// HISTORIAL
// ══════════════════════════════════════
function buildHistorial() {
  const el = document.getElementById('content-historial');
  const loadEl = document.getElementById('loading-historial');

  const calcTec = (s) => { const v=[num(s[COL.drive]),num(s[COL.reves]),num(s[COL.saque]),num(s[COL.volea]),num(s[COL.resto])].filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; };
  const calcFis = (s) => { const v=[num(s[COL.resistencia]),num(s[COL.velocidad]),num(s[COL.agilidad]),num(s[COL.fuerza])].filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; };
  const calcMen = (s) => { const v=[num(s[COL.concentracion]),num(s[COL.actitud]),num(s[COL.errores])].filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; };

  const sess = filteredSessions;

  if (!sess.length) {
    loadEl.style.display = 'none';
    el.style.display = 'block';
    el.innerHTML = '<div class="empty">No hay sesiones en el período seleccionado.</div>';
    return;
  }

  const sessReversed = [...sess].reverse();

  el.innerHTML = `<div class="card">
    <div class="card-title">${sess.length} sesiones registradas</div>
    ${sessReversed.map(s => {
      const tec = calcTec(s);
      const fis = calcFis(s);
      const men = calcMen(s);
      const tipo = s[COL.tipo] || '';
      const dotColor = tipo.toLowerCase().includes('físic') ? '#2d6a4f'
        : tipo.toLowerCase().includes('mental') ? '#7c3aed'
        : tipo.toLowerCase().includes('partido') || tipo.toLowerCase().includes('torneo') ? '#b45309'
        : '#2563eb';
      return `<div class="session-item">
        <div class="session-dot" style="background:${dotColor};margin-top:6px;"></div>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
            ${typeBadge(tipo)}
            <span class="session-date">${fmtDate(s[COL.fecha])}</span>
          </div>
          ${s[COL.descripcion] ? `<div style="font-size:12px;color:var(--muted);margin-bottom:5px;">${s[COL.descripcion]}</div>` : ''}
          <div class="session-pills">
            ${tec>0?`<span class="session-pill">Téc ${tec.toFixed(1)}</span>`:''}
            ${fis>0?`<span class="session-pill">Fís ${fis.toFixed(1)}</span>`:''}
            ${men>0?`<span class="session-pill">Men ${men.toFixed(1)}</span>`:''}
            ${num(s[COL.drive])>0?`<span class="session-pill">Drive ${num(s[COL.drive]).toFixed(0)}</span>`:''}
            ${num(s[COL.reves])>0?`<span class="session-pill">Revés ${num(s[COL.reves]).toFixed(0)}</span>`:''}
            ${num(s[COL.saque])>0?`<span class="session-pill">Saque ${num(s[COL.saque]).toFixed(0)}</span>`:''}
          </div>
          ${s[COL.obs_profe] ? `<div class="feedback-block" style="margin-top:8px;font-size:12px;border-color:var(--ball);">${s[COL.obs_profe]}</div>` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>`;

  loadEl.style.display = 'none';
  el.style.display = 'block';
}

// ══════════════════════════════════════
// START
// ══════════════════════════════════════
init();
</script>
</body>
</html>
