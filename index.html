<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia de Tenis — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a18;
    --muted: #7a7a72;
    --hint: #b0b0a8;
    --accent: #2d6a4f;
    --accent2: #52b788;
    --accent-light: #d8f3dc;
    --warn: #e76f51;
    --warn-light: #fde8e0;
    --blue: #3a86ff;
    --blue-light: #dbeafe;
    --purple: #6366f1;
    --purple-light: #ede9fe;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --radius: 14px;
    --radius-sm: 8px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { flex: 1; overflow-x: hidden; }

  /* SIDEBAR */
  .sidebar-brand { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .brand-name { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); }
  .brand-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sidebar-section { padding: 14px 12px 6px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--hint); }
  .player-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer; border-radius: var(--radius-sm); margin: 1px 8px; transition: background 0.15s; }
  .player-item:hover { background: var(--surface2); }
  .player-item.active { background: var(--accent-light); }
  .player-item.active .player-item-name { color: var(--accent); font-weight: 500; }
  .avatar-sm { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .player-item-name { font-size: 13px; color: var(--text); }
  .player-item-level { font-size: 10px; color: var(--muted); }
  .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
  .coach-btn { width: 100%; padding: 9px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .coach-btn:hover { opacity: 0.88; }

  /* HEADER */
  .page-header { padding: 28px 32px 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .page-title { font-size: 22px; font-weight: 600; color: var(--text); }
  .page-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .header-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; padding: 20px 32px 0; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; font-size: 13px; font-weight: 400; color: var(--muted); cursor: pointer; border: none; background: none; font-family: var(--font); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); font-weight: 500; border-bottom-color: var(--accent); }

  /* CONTENT */
  .content { padding: 24px 32px 40px; }
  .view { display: none; }
  .view.active { display: block; }

  /* METRIC CARDS */
  .metrics-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
  .metric-value { font-size: 26px; font-weight: 600; color: var(--text); margin: 4px 0 2px; line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--hint); }
  .metric-up { color: var(--accent2); }
  .metric-down { color: var(--warn); }

  /* SECTION CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 16px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* SKILL BARS */
  .skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .skill-row:last-child { margin-bottom: 0; }
  .skill-name { width: 110px; font-size: 13px; color: var(--text); flex-shrink: 0; }
  .skill-track { flex: 1; height: 7px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .skill-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .skill-score { font-size: 12px; font-family: var(--mono); font-weight: 500; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }
  .skill-delta { font-size: 10px; width: 28px; text-align: right; flex-shrink: 0; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .badge-green { background: var(--accent-light); color: var(--accent); }
  .badge-blue { background: var(--blue-light); color: var(--blue); }
  .badge-amber { background: var(--amber-light); color: var(--amber); }
  .badge-red { background: var(--warn-light); color: var(--warn); }
  .badge-purple { background: var(--purple-light); color: var(--purple); }

  /* SESSION LIST */
  .session-item { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .session-item:last-child { border-bottom: none; }
  .session-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .session-date { font-size: 11px; color: var(--hint); font-family: var(--mono); }
  .session-desc { font-size: 13px; color: var(--text); margin: 2px 0; }
  .session-scores { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
  .score-tag { font-size: 11px; color: var(--muted); background: var(--surface2); padding: 2px 7px; border-radius: 5px; font-family: var(--mono); }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .form-input { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font); font-size: 13px; color: var(--text); background: var(--surface); outline: none; transition: border 0.15s; }
  .form-input:focus { border-color: var(--accent2); }
  select.form-input { cursor: pointer; }
  textarea.form-input { resize: vertical; min-height: 70px; }
  .slider-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .slider-label { font-size: 12px; width: 110px; flex-shrink: 0; color: var(--text); }
  .slider-track { flex: 1; }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  .slider-val { font-size: 13px; font-weight: 600; font-family: var(--mono); width: 22px; text-align: right; color: var(--accent); flex-shrink: 0; }
  .section-divider { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .save-btn { background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 10px 24px; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 16px; transition: opacity 0.15s; }
  .save-btn:hover { opacity: 0.88; }
  .saved-msg { font-size: 12px; color: var(--accent2); margin-left: 10px; display: none; }

  /* CHART */
  .chart-wrap { position: relative; width: 100%; height: 240px; }

  /* COACH VIEW */
  .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
  .player-card:hover { border-color: var(--accent2); transform: translateY(-1px); }
  .player-card-name { font-size: 14px; font-weight: 500; margin: 10px 0 4px; }
  .player-card-meta { font-size: 11px; color: var(--muted); }
  .mini-bars { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; }
  .mini-bar-row { display: flex; align-items: center; gap: 6px; }
  .mini-bar-label { font-size: 10px; color: var(--muted); width: 32px; flex-shrink: 0; }
  .mini-bar-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 99px; }
  .mini-bar-val { font-size: 10px; font-family: var(--mono); color: var(--hint); width: 20px; text-align: right; flex-shrink: 0; }

  /* FEEDBACK */
  .feedback-block { background: var(--surface2); border-left: 3px solid var(--accent2); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.6; }
  .feedback-date { font-size: 11px; color: var(--hint); margin-bottom: 4px; font-family: var(--mono); }

  /* OBJECTIVE */
  .obj-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .obj-label { font-size: 13px; width: 140px; flex-shrink: 0; }
  .obj-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .obj-fill { height: 100%; border-radius: 99px; }
  .obj-vals { font-size: 11px; color: var(--muted); width: 60px; text-align: right; font-family: var(--mono); flex-shrink: 0; }

  /* RESPONSIVE */
  @media(max-width: 700px) {
    .sidebar { width: 200px; }
    .content { padding: 16px; }
    .page-header { padding: 16px 16px 0; }
    .tabs { padding: 12px 16px 0; }
    .two-col { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
  }
  @media(max-width: 520px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: relative; }
    .sidebar-footer { display: none; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">Academia</div>

    <div class="player-item active" onclick="showCoach(this)">

</div>

      {date:'2025-03-13',type:'tec',desc:'Técnica básica de drive y revés.',feedback:'Gran actitud de aprendizaje. Bases bien asimiladas.',drive:5,reves:5,saque:4,volea:3,resto:4,res:5,vel:6,agi:6,con:7,act:9,err:7},
      {date:'2025-03-24',type:'fis',desc:'Coordinación y movimiento básico.',feedback:'Coordinación natural buena. Potencial físico alto.',drive:5,reves:5,saque:5,volea:3,resto:4,res:6,vel:6,agi:7,con:7,act:9,err:7},
      {date:'2025-04-07',type:'tec',desc:'Saque y posicionamiento.',feedback:'Aprende muy rápido. Talento natural visible.',drive:6,reves:5,saque:5,volea:4,resto:5,res:6,vel:7,agi:7,con:7,act:9,err:7},
      {date:'2025-04-21',type:'par',desc:'Primeros puntos de práctica.',feedback:'Disfrutó mucho la competencia. Eso es lo más importante.',drive:6,reves:5,saque:5,volea:4,resto:5,res:6,vel:7,agi:7,con:8,act:10,err:7},
    ],
    objetivo:'Consolidar técnica base · Saque a 6',
    objs:[{label:'Drive',actual:6,meta:7},{label:'Saque',actual:5,meta:6},{label:'Actitud',actual:10,meta:10}]
  },
];

function getAvgTec(s) { return +((s.drive+s.reves+s.saque+s.volea+s.resto)/5).toFixed(1); }
function getAvgFis(s) { return +((s.res+s.vel+s.agi)/3).toFixed(1); }
function getAvgMen(s) { return +((s.con+s.act+s.err)/3).toFixed(1); }
function getLastSession(p) { return p.sessions[p.sessions.length-1]; }
function getAvatarColors(c) { const parts=c.split(':'); return {bg:parts[0],fg:parts[1]}; }
function getTypeBadge(t) {
  const m={tec:'badge-blue Técnica',fis:'badge-green Física',par:'badge-amber Partido',men:'badge-purple Mental'};
  const v=m[t]||'badge-blue Sesión'; const parts=v.split(' ');
  return `<span class="badge ${parts[0]}">${parts[1]}</span>`;
}

let currentPlayer = null;
let chartInstance = null;

function buildSidebar() {
  const list = document.getElementById('player-list');
  list.innerHTML = players.map(p => {
    const c = getAvatarColors(p.color);
    const last = getLastSession(p);
    const tec = getAvgTec(last);
    return `<div class="player-item" onclick="showPlayer(${p.id}, this)">
      <div class="avatar-sm" style="background:${c.bg};color:${c.fg};">${p.initials}</div>
      <div>
        <div class="player-item-name">${p.name}</div>
        <div class="player-item-level">${p.age} años · Tec ${tec}</div>
      </div>
    </div>`;
  }).join('');
}

function showCoach(el) {
  document.querySelectorAll('.player-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  currentPlayer = null;
  renderCoachView();
}

    <div class="page-header">
      <div>

        <div class="page-meta">7 jugadores activos · Temporada 2025</div>
      </div>
    </div>
    <div class="content">
      <div class="metrics-row">

          <div class="metric-label">Jugadores</div>

          <div class="metric-sub">activos este mes</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Sesiones totales</div>
          <div class="metric-value">${players.reduce((s,p)=>s+p.sessions.length,0)}</div>
          <div class="metric-sub">registradas</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Promedio técnico</div>
          <div class="metric-value">${(players.reduce((s,p)=>s+getAvgTec(getLastSession(p)),0)/players.length).toFixed(1)}</div>

        </div>
        <div class="metric-card">

          <div class="metric-value" style="font-size:16px;">${players.sort((a,b)=>getLastSession(b).act-getLastSession(a).act)[0].name.split(' ')[0]}</div>
          <div class="metric-sub">esta semana</div>
        </div>
      </div>

        <div class="card-title">Todos los jugadores</div>

  grid.innerHTML = players.map(p => {
    const c = getAvatarColors(p.color);

    const men = getAvgMen(last);
    return `<div class="player-card" onclick="showPlayer(${p.id}, null)">
      <div class="avatar-sm" style="background:${c.bg};color:${c.fg};width:36px;height:36px;font-size:13px;">${p.initials}</div>
      <div class="player-card-name">${p.name}</div>
      <div class="player-card-meta">${p.age} años · ${p.sessions.length} sesiones</div>
      <div class="mini-bars">
        <div class="mini-bar-row"><span class="mini-bar-label">Téc</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${tec*10}%;background:#3a86ff;"></div></div><span class="mini-bar-val">${tec}</span></div>
        <div class="mini-bar-row"><span class="mini-bar-label">Fís</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${fis*10}%;background:#2d6a4f;"></div></div><span class="mini-bar-val">${fis}</span></div>
        <div class="mini-bar-row"><span class="mini-bar-label">Men</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${men*10}%;background:#6366f1;"></div></div><span class="mini-bar-val">${men}</span></div>
      </div>
    </div>`;

function showPlayer(id, sidebarEl) {
  currentPlayer = players.find(p=>p.id===id);
  document.querySelectorAll('.player-item').forEach(i=>i.classList.remove('active'));
  if(sidebarEl) sidebarEl.classList.add('active');
  else {
    const items = document.querySelectorAll('.player-item');
    items.forEach(item => { if(item.textContent.includes(currentPlayer.name.split(' ')[0])) item.classList.add('active'); });
  }
  renderPlayerView('resumen');
}

function renderPlayerView(tab) {
  const p = currentPlayer;
  const c = getAvatarColors(p.color);
  const last = getLastSession(p);
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="page-header">
      <div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="avatar-sm" style="background:${c.bg};color:${c.fg};width:44px;height:44px;font-size:15px;">${p.initials}</div>
          <div>
            <div class="page-title">${p.name}</div>
            <div class="page-meta">${p.age} años · Nivel competitivo · ${p.sessions.length} sesiones registradas</div>
          </div>
        </div>
        <div class="header-badges" style="margin-top:10px;">
          <span class="badge badge-green">Activo</span>
          <span class="badge badge-blue">${p.objetivo}</span>
        </div>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab ${tab==='resumen'?'active':''}" onclick="renderPlayerView('resumen')">Resumen</button>
      <button class="tab ${tab==='progreso'?'active':''}" onclick="renderPlayerView('progreso')">Progreso</button>
      <button class="tab ${tab==='historial'?'active':''}" onclick="renderPlayerView('historial')">Historial</button>
      <button class="tab ${tab==='registrar'?'active':''}" onclick="renderPlayerView('registrar')">+ Sesión</button>
    </nav>
    <div class="content" id="tab-content"></div>`;

  const content = document.getElementById('tab-content');
  if(tab==='resumen') renderResumen(p, last, content);
  if(tab==='progreso') renderProgreso(p, content);
  if(tab==='historial') renderHistorial(p, content);
  if(tab==='registrar') renderRegistrar(p, content);
}

function renderResumen(p, last, el) {
  const tec = getAvgTec(last);
  const fis = getAvgFis(last);
  const men = getAvgMen(last);
  const prev = p.sessions.length > 1 ? p.sessions[p.sessions.length-2] : last;
  const tecD = (tec - getAvgTec(prev)).toFixed(1);
  const fisD = (fis - getAvgFis(prev)).toFixed(1);
  const menD = (men - getAvgMen(prev)).toFixed(1);
  const delta = v => v > 0 ? `<span class="metric-up">+${v}</span>` : v < 0 ? `<span class="metric-down">${v}</span>` : `<span style="color:var(--hint)">—</span>`;

  const skillColor = v => v>=8?'#2d6a4f':v>=6?'#3a86ff':v>=4?'#d97706':'#e76f51';
  const skillRow = (name, val, prev) => {
    const d = val-prev; const dc = d>0?'metric-up':d<0?'metric-down':'';
    return `<div class="skill-row">
      <span class="skill-name">${name}</span>
      <div class="skill-track"><div class="skill-fill" style="width:${val*10}%;background:${skillColor(val)};"></div></div>
      <span class="skill-score">${val}</span>
      <span class="skill-delta ${dc}">${d>0?'+'+d:d<0?d:''}</span>
    </div>`;
  };

  el.innerHTML = `
    <div class="metrics-row">
      <div class="metric-card"><div class="metric-label">Técnica</div><div class="metric-value">${tec}</div><div class="metric-sub">${delta(tecD)} vs anterior</div></div>
      <div class="metric-card"><div class="metric-label">Físico</div><div class="metric-value">${fis}</div><div class="metric-sub">${delta(fisD)} vs anterior</div></div>
      <div class="metric-card"><div class="metric-label">Mental</div><div class="metric-value">${men}</div><div class="metric-sub">${delta(menD)} vs anterior</div></div>
      <div class="metric-card"><div class="metric-label">Sesiones</div><div class="metric-value">${p.sessions.length}</div><div class="metric-sub">registradas</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Técnica</div>
        ${skillRow('Drive',last.drive,prev.drive)}
        ${skillRow('Revés',last.reves,prev.reves)}
        ${skillRow('Saque',last.saque,prev.saque)}
        ${skillRow('Volea',last.volea,prev.volea)}
        ${skillRow('Resto',last.resto,prev.resto)}
      </div>
      <div>
        <div class="card">
          <div class="card-title">Físico</div>
          ${skillRow('Resistencia',last.res,prev.res)}
          ${skillRow('Velocidad',last.vel,prev.vel)}
          ${skillRow('Agilidad',last.agi,prev.agi)}
        </div>
        <div class="card">
          <div class="card-title">Mental</div>
          ${skillRow('Concentración',last.con,prev.con)}
          ${skillRow('Actitud',last.act,prev.act)}
          ${skillRow('Gestión errores',last.err,prev.err)}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Objetivos del mes</div>
      ${p.objs.map(o=>`
        <div class="obj-row">
          <span class="obj-label">${o.label}</span>
          <div class="obj-track"><div class="obj-fill" style="width:${Math.min(100,(o.actual/o.meta)*100)}%;background:${o.actual>=o.meta?'#2d6a4f':'#3a86ff'};"></div></div>
          <span class="obj-vals">${o.actual} / ${o.meta}</span>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Último feedback del coach</div>
      <div class="feedback-date">${new Date(last.date+'T12:00:00').toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})}</div>
      <div class="feedback-block">${last.feedback}</div>
    </div>`;
}

function renderProgreso(p, el) {
  el.innerHTML = `
    <div class="card">
      <div class="card-title">Evolución técnica</div>
      <div class="chart-wrap"><canvas id="chart-tec" role="img" aria-label="Gráfico evolución técnica de ${p.name}">Evolución técnica por sesión.</canvas></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Físico</div>
        <div class="chart-wrap" style="height:180px;"><canvas id="chart-fis" role="img" aria-label="Evolución física">Evolución física.</canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Mental</div>
        <div class="chart-wrap" style="height:180px;"><canvas id="chart-men" role="img" aria-label="Evolución mental">Evolución mental.</canvas></div>
      </div>
    </div>`;

  const labels = p.sessions.map(s=>new Date(s.date+'T12:00:00').toLocaleDateString('es-AR',{day:'numeric',month:'short'}));
  const opts = (min,max) => ({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#7a7a72',font:{size:11},boxWidth:8,padding:10}}},scales:{y:{min,max,ticks:{stepSize:1,color:'#b0b0a8',font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{color:'#b0b0a8',font:{size:10},autoSkip:false,maxRotation:30},grid:{color:'rgba(0,0,0,0.05)'}}}});

  new Chart(document.getElementById('chart-tec'),{type:'line',data:{labels,datasets:[
    {label:'Drive',data:p.sessions.map(s=>s.drive),borderColor:'#3a86ff',backgroundColor:'rgba(58,134,255,0.07)',tension:0.35,pointRadius:4,pointBackgroundColor:'#3a86ff'},
    {label:'Revés',data:p.sessions.map(s=>s.reves),borderColor:'#e76f51',backgroundColor:'rgba(231,111,81,0.07)',tension:0.35,pointRadius:4,pointBackgroundColor:'#e76f51'},
    {label:'Saque',data:p.sessions.map(s=>s.saque),borderColor:'#2d6a4f',backgroundColor:'rgba(45,106,79,0.07)',tension:0.35,pointRadius:4,pointBackgroundColor:'#2d6a4f'},
  ]},options:opts(0,10)});

  new Chart(document.getElementById('chart-fis'),{type:'line',data:{labels,datasets:[
    {label:'Resistencia',data:p.sessions.map(s=>s.res),borderColor:'#2d6a4f',tension:0.35,pointRadius:3,pointBackgroundColor:'#2d6a4f'},
    {label:'Velocidad',data:p.sessions.map(s=>s.vel),borderColor:'#d97706',tension:0.35,pointRadius:3,pointBackgroundColor:'#d97706'},
    {label:'Agilidad',data:p.sessions.map(s=>s.agi),borderColor:'#6366f1',tension:0.35,pointRadius:3,pointBackgroundColor:'#6366f1'},
  ]},options:opts(0,10)});

  new Chart(document.getElementById('chart-men'),{type:'line',data:{labels,datasets:[
    {label:'Concentración',data:p.sessions.map(s=>s.con),borderColor:'#6366f1',tension:0.35,pointRadius:3,pointBackgroundColor:'#6366f1'},
    {label:'Actitud',data:p.sessions.map(s=>s.act),borderColor:'#db2777',tension:0.35,pointRadius:3,pointBackgroundColor:'#db2777'},
    {label:'Gestión errores',data:p.sessions.map(s=>s.err),borderColor:'#e76f51',tension:0.35,pointRadius:3,pointBackgroundColor:'#e76f51'},
  ]},options:opts(0,10)});
}

function renderHistorial(p, el) {
  el.innerHTML = `<div class="card">
    <div class="card-title">${p.sessions.length} sesiones registradas</div>
    ${p.sessions.slice().reverse().map(s=>`
      <div class="session-item">
        <div class="session-dot" style="background:${s.type==='tec'?'#3a86ff':s.type==='fis'?'#2d6a4f':s.type==='par'?'#d97706':'#6366f1'};"></div>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
            ${getTypeBadge(s.type)}
            <span class="session-date">${new Date(s.date+'T12:00:00').toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})}</span>
          </div>
          <div class="session-desc">${s.desc}</div>
          <div class="session-scores">
            <span class="score-tag">Drive ${s.drive}</span>
            <span class="score-tag">Revés ${s.reves}</span>
            <span class="score-tag">Saque ${s.saque}</span>
            <span class="score-tag">Fís ${getAvgFis(s)}</span>
            <span class="score-tag">Men ${getAvgMen(s)}</span>
          </div>
          ${s.feedback?`<div class="feedback-block" style="margin-top:8px;font-size:12px;">${s.feedback}</div>`:''}
        </div>
      </div>`).join('')}
  </div>`;
}

function renderRegistrar(p, el) {
  el.innerHTML = `<div class="card">
    <div class="card-title">Nueva sesión — ${p.name}</div>
    <div class="form-grid" style="margin-bottom:14px;">
      <div class="form-group"><label class="form-label">Fecha</label><input class="form-input" type="date" id="inp-fecha" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-group"><label class="form-label">Tipo</label>
        <select class="form-input" id="inp-tipo">
          <option value="tec">Técnica</option>
          <option value="fis">Física</option>
          <option value="par">Partido</option>
          <option value="men">Mental</option>
        </select>
      </div>
    </div>
    <div class="section-divider">Técnica</div>
    ${['drive:Drive','reves:Revés','saque:Saque','volea:Volea','resto:Resto'].map(x=>{const[id,lbl]=x.split(':');const v=getLastSession(p)[id];return `<div class="slider-group"><span class="slider-label">${lbl}</span><div class="slider-track"><input type="range" min="1" max="10" step="1" value="${v}" id="sl-${id}" oninput="document.getElementById('out-${id}').textContent=this.value"></div><span class="slider-val" id="out-${id}">${v}</span></div>`;}).join('')}
    <div class="section-divider">Físico</div>
    ${['res:Resistencia','vel:Velocidad','agi:Agilidad'].map(x=>{const[id,lbl]=x.split(':');const v=getLastSession(p)[id];return `<div class="slider-group"><span class="slider-label">${lbl}</span><div class="slider-track"><input type="range" min="1" max="10" step="1" value="${v}" id="sl-${id}" oninput="document.getElementById('out-${id}').textContent=this.value"></div><span class="slider-val" id="out-${id}">${v}</span></div>`;}).join('')}
    <div class="section-divider">Mental</div>
    ${['con:Concentración','act:Actitud','err:Gestión errores'].map(x=>{const[id,lbl]=x.split(':');const v=getLastSession(p)[id];return `<div class="slider-group"><span class="slider-label">${lbl}</span><div class="slider-track"><input type="range" min="1" max="10" step="1" value="${v}" id="sl-${id}" oninput="document.getElementById('out-${id}').textContent=this.value"></div><span class="slider-val" id="out-${id}">${v}</span></div>`;}).join('')}
    <div class="section-divider">Notas</div>
    <div class="form-group" style="margin-bottom:10px;"><label class="form-label">Descripción de la sesión</label><textarea class="form-input" id="inp-desc" placeholder="Ej: Trabajo de revés cruzado bajo presión de peloteo..."></textarea></div>
    <div class="form-group"><label class="form-label">Feedback del coach</label><textarea class="form-input" id="inp-feedback" placeholder="Ej: Excelente actitud. Seguir con la preparación temprana del revés."></textarea></div>
    <div style="display:flex;align-items:center;margin-top:16px;">
      <button class="save-btn" onclick="guardarSesion(${p.id})">Guardar sesión</button>
      <span class="saved-msg" id="saved-msg">Sesión guardada</span>
    </div>
  </div>`;
}

function guardarSesion(pid) {
  const p = players.find(x=>x.id===pid);
  const fecha = document.getElementById('inp-fecha').value;
  if(!fecha){ alert('Ingresá una fecha.'); return; }
  const get = id => parseInt(document.getElementById('sl-'+id).value);
  p.sessions.push({
    date: fecha,
    type: document.getElementById('inp-tipo').value,
    desc: document.getElementById('inp-desc').value || '—',
    feedback: document.getElementById('inp-feedback').value || '—',
    drive:get('drive'),reves:get('reves'),saque:get('saque'),volea:get('volea'),resto:get('resto'),
    res:get('res'),vel:get('vel'),agi:get('agi'),
    con:get('con'),act:get('act'),err:get('err'),
  });
  p.sessions.sort((a,b)=>a.date.localeCompare(b.date));
  const msg = document.getElementById('saved-msg');
  msg.style.display='inline';
  setTimeout(()=>{ msg.style.display='none'; renderPlayerView('historial'); }, 1500);
}

function showView(v) { if(currentPlayer) renderPlayerView('registrar'); }

buildSidebar();
renderCoachView();
</script>
